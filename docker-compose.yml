version: '3.9'

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL 15 database
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: institution_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-institution_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-institution_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # API server
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: institution_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the db service defined above
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-institution_db}?schema=public
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
